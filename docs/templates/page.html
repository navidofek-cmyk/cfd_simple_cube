{% extends "base.html" %}
{% block content %}
  {% if toc and '<li>' in toc %}
  <details class="toc-box" open>
    <summary>Obsah stránky</summary>
    {{ toc | safe }}
  </details>
  {% endif %}

  {{ content | safe }}

  <nav class="page-nav">
    {% if prev %}
      <a class="prev" href="{{ '/' if prev[0] == 'index' else '/page/' + prev[0] }}">
        ← {{ prev[1] }}</a>
    {% else %}<span></span>{% endif %}
    {% if next %}
      <a class="next" href="{{ '/' if next[0] == 'index' else '/page/' + next[0] }}">
        {{ next[1] }} →</a>
    {% endif %}
  </nav>
{% endblock %}
